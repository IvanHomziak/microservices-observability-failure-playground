version: '3.9'

# First-pass reduced scope:
# - Fully implemented and runnable: api-gateway, orders-service, payments-service, PostgreSQL.
# - Placeholder/skeleton only: Kafka/Redpanda and full observability stack.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  api-gateway:
    build: ./api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_SERVICE_NAME: api-gateway
      ENVIRONMENT: local
    depends_on:
      - orders-service
    ports:
      - "8080:8080"

  orders-service:
    build: ./orders-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orders
      OTEL_SERVICE_NAME: orders-service
      ENVIRONMENT: local
    depends_on:
      - postgres
    ports:
      - "8081:8081"

  payments-service:
    build: ./payments-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_SERVICE_NAME: payments-service
      ENVIRONMENT: local
    ports:
      - "8082:8082"
