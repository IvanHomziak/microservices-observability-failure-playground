version: '3.9'

services:


  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.10
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - '1'
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - '0'
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - redpanda:8082
    ports:
      - "9092:9092"

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.5
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      - redpanda
    ports:
      - "8088:8080"
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  api-gateway:
    build: ./api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_SERVICE_NAME: api-gateway
      ENVIRONMENT: local
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      - orders-service
      - otel-collector
      - notification-service
    ports:
      - "8080:8080"

  orders-service:
    build: ./orders-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orders
      OTEL_SERVICE_NAME: orders-service
      ENVIRONMENT: local
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      ORDERS_EVENTS_KAFKA_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      ORDERS_FAILURES_DATABASE_SLOW_QUERY_ENABLED: ${ORDERS_FAILURES_DATABASE_SLOW_QUERY_ENABLED:-false}
      ORDERS_FAILURES_DATABASE_SLOW_QUERY_DELAY_MS: ${ORDERS_FAILURES_DATABASE_SLOW_QUERY_DELAY_MS:-0}
    depends_on:
      - postgres
      - redpanda
      - otel-collector
    ports:
      - "8081:8081"


  audit-service:
    build: ./audit-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_SERVICE_NAME: audit-service
      ENVIRONMENT: local
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      - redpanda
      - otel-collector
    ports:
      - "8085:8085"

  inventory-service:
    build: ./inventory-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_SERVICE_NAME: inventory-service
      ENVIRONMENT: local
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      - redpanda
      - otel-collector
    ports:
      - "8083:8083"


  notification-service:
    build: ./notification-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_SERVICE_NAME: notification-service
      ENVIRONMENT: local
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      - otel-collector
    ports:
      - "8084:8084"
  payments-service:
    build: ./payments-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_SERVICE_NAME: payments-service
      ENVIRONMENT: local
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      - otel-collector
    ports:
      - "8082:8082"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    command: ["--config=/etc/otelcol-contrib/otel-collector.yml"]
    volumes:
      - ./observability/otel-collector/otel-collector.yml:/etc/otelcol-contrib/otel-collector.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api-gateway
      - orders-service
      - payments-service

  loki:
    image: grafana/loki:3.0.0
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro

  promtail:
    image: grafana/promtail:3.0.0
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
