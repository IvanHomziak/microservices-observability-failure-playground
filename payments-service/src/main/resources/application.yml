spring:
  application:
    name: payments-service
  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

otel:
  resource:
    attributes: service.name=${spring.application.name},deployment.environment=${ENVIRONMENT:local}

logging:
  pattern:
    level: "service=${spring.application.name} environment=${ENVIRONMENT:local} correlation_id=%X{correlation_id:-} trace_id=%X{traceId:-} span_id=%X{spanId:-} %5p"
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name}
        environment: ${ENVIRONMENT:local}
      fields:
        correlation_id: ${CORRELATION_ID:}

failure-simulation:
  payments:
    delay-ms: 5000
    forced-status-code: 0
    failure-rate: 0.0
    invalid-json-enabled: false
    decline-enabled: false
    timeout-enabled: false

---
spring:
  config:
    activate:
      on-profile: docker
  kafka:
    bootstrap-servers: redpanda:9092
