spring:
  application:
    name: payments-service
  kafka:
    bootstrap-servers: redpanda:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://otel-collector:4317

failure-simulation:
  payments:
    delay-ms: 5000
    forced-status-code: 0
    failure-rate: 0.0
    invalid-json-enabled: false
    decline-enabled: false
    timeout-enabled: false

logging:
  structured:
    format:
      console: logstash
