name: Unit Test Coverage PR Agent

on:
  pull_request:
    paths:
      - "**/src/main/java/**"
      - "**/src/test/java/**"
      - "**/pom.xml"
      - "coverage-policy.yml"
      - "agents/unit_test_coverage_agent/**"
      - ".github/workflows/unit-test-coverage-pr-agent.yml"

permissions:
  contents: read
  actions: read

concurrency:
  group: unit-test-coverage-pr-agent-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-coverage-evidence:
    name: Generate deterministic unit test coverage evidence for PR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout pull request code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate coverage agent package
        shell: bash
        run: |
          set -euo pipefail
          cd agents/unit_test_coverage_agent
          python -m compileall src tests
          python -m unittest discover -s tests

      - name: Run Maven tests and JaCoCo reports
        shell: bash
        run: |
          set -euo pipefail
          services=(api-gateway orders-service payments-service inventory-service notification-service audit-service)
          failed_services=()
          for service in "${services[@]}"; do
            if [ -f "$service/pom.xml" ]; then
              echo "Running Maven verify for $service"
              if ! (cd "$service" && mvn -B -ntp verify); then
                echo "Maven verify failed for $service; continuing to collect available evidence"
                failed_services+=("$service")
              fi
            fi
          done
          if [ ${#failed_services[@]} -gt 0 ]; then
            printf '%s\n' "${failed_services[@]}" > coverage-agent-maven-failed-services.txt
          fi

      - name: Generate deterministic coverage report
        shell: bash
        env:
          COVERAGE_BASE_REF: origin/${{ github.base_ref }}
          COVERAGE_HEAD_REF: HEAD
        run: |
          set -euo pipefail
          mkdir -p coverage-agent/output coverage-agent/raw
          PYTHONPATH="agents/unit_test_coverage_agent/src" python -m unit_test_coverage_agent.main \
            --repository-root . \
            --base-ref "$COVERAGE_BASE_REF" \
            --head-ref "$COVERAGE_HEAD_REF" \
            --provider deterministic \
            --output coverage-agent/output/unit-test-coverage-report.md \
            --json-output coverage-agent/output/unit-test-coverage-report.json \
            --prompt-output coverage-agent/output/coverage-reasoning-prompt.md \
            --patch-proposal-output coverage-agent/output/unit-test-coverage-patch-proposal.md \
            --patch-proposal-json-output coverage-agent/output/unit-test-coverage-patch-proposal.json
          git diff --name-only "$COVERAGE_BASE_REF...$COVERAGE_HEAD_REF" > coverage-agent/raw/changed-files.txt
          find . -path "*/target/surefire-reports/TEST-*.xml" -type f -print > coverage-agent/raw/surefire-files.txt || true
          find . -path "*/target/site/jacoco/jacoco.xml" -type f -print > coverage-agent/raw/jacoco-files.txt || true
          if [ -f coverage-agent-maven-failed-services.txt ]; then
            cp coverage-agent-maven-failed-services.txt coverage-agent/raw/maven-failed-services.txt
          fi
          cat coverage-agent/output/unit-test-coverage-report.md
          cat coverage-agent/output/unit-test-coverage-patch-proposal.md

      - name: Upload coverage agent artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage-pr-agent-${{ github.run_id }}
          path: |
            coverage-agent/output/unit-test-coverage-report.md
            coverage-agent/output/unit-test-coverage-report.json
            coverage-agent/output/unit-test-coverage-patch-proposal.md
            coverage-agent/output/unit-test-coverage-patch-proposal.json
            coverage-agent/output/coverage-reasoning-prompt.md
            coverage-agent/raw/*.txt
            */target/surefire-reports/TEST-*.xml
            */target/site/jacoco/jacoco.xml
          if-no-files-found: warn
          retention-days: 14
