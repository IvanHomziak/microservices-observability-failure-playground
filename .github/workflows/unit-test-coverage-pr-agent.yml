name: Unit Test Coverage PR Agent

on:
  pull_request:
    paths:
      - "**/src/main/java/**"
      - "**/src/test/java/**"
      - "**/pom.xml"
      - "coverage-policy.yml"
      - "coverage-policy-pr.yml"
      - "agents/unit_test_coverage_agent/**"
      - ".github/workflows/unit-test-coverage-pr-agent.yml"

permissions:
  contents: read
  actions: read

concurrency:
  group: unit-test-coverage-pr-agent-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-coverage-evidence:
    name: Generate deterministic unit test coverage evidence for PR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout pull request code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate coverage agent package
        shell: bash
        run: |
          set -euo pipefail
          cd agents/unit_test_coverage_agent
          python -m compileall src tests
          python -m unittest discover -s tests

      - name: Detect affected services
        shell: bash
        env:
          COVERAGE_BASE_REF: origin/${{ github.base_ref }}
          COVERAGE_HEAD_REF: HEAD
        run: |
          set -euo pipefail
          mkdir -p coverage-agent/raw
          PYTHONPATH="agents/unit_test_coverage_agent/src" python - <<'PY'
          from pathlib import Path
          from unit_test_coverage_agent.affected_services import detect_affected_services
          from unit_test_coverage_agent.git_diff import load_changed_files

          root = Path('.')
          base_ref = "${COVERAGE_BASE_REF}"
          head_ref = "${COVERAGE_HEAD_REF}"

          git = load_changed_files(root, base_ref, head_ref)
          changed_output = root / "coverage-agent/raw/changed-files.txt"
          changed_output.write_text("\n".join(git.raw_changed_files) + ("\n" if git.raw_changed_files else ""), encoding="utf-8")

          affected = detect_affected_services(git)
          affected_output = root / "coverage-agent/raw/affected-services.txt"
          affected_output.write_text("\n".join(affected) + ("\n" if affected else ""), encoding="utf-8")
          print(f"Detected affected services: {', '.join(affected) if affected else 'none'}")
          PY

      - name: Run Maven tests and JaCoCo reports for affected services
        shell: bash
        run: |
          set -euo pipefail
          : > coverage-agent/raw/maven-failed-services.txt
          if [ ! -s coverage-agent/raw/affected-services.txt ]; then
            echo "No affected services detected; skipping Maven verify"
            exit 0
          fi
          while IFS= read -r service; do
            [ -n "$service" ] || continue
            if [ -f "$service/pom.xml" ]; then
              echo "Running Maven verify for $service"
              if ! (cd "$service" && mvn -B -ntp verify); then
                echo "Maven verify failed for $service; continuing to collect available evidence"
                echo "$service" >> coverage-agent/raw/maven-failed-services.txt
              fi
            fi
          done < coverage-agent/raw/affected-services.txt

      - name: Generate deterministic coverage report
        shell: bash
        env:
          COVERAGE_BASE_REF: origin/${{ github.base_ref }}
          COVERAGE_HEAD_REF: HEAD
        run: |
          set -euo pipefail
          mkdir -p coverage-agent/output coverage-agent/raw
          PYTHONPATH="agents/unit_test_coverage_agent/src" python -m unit_test_coverage_agent.main \
            --repository-root . \
            --base-ref "$COVERAGE_BASE_REF" \
            --head-ref "$COVERAGE_HEAD_REF" \
            --policy coverage-policy-pr.yml \
            --provider deterministic \
            --output coverage-agent/output/unit-test-coverage-report.md \
            --json-output coverage-agent/output/unit-test-coverage-report.json \
            --prompt-output coverage-agent/output/coverage-reasoning-prompt.md \
            --patch-proposal-output coverage-agent/output/unit-test-coverage-patch-proposal.md \
            --patch-proposal-json-output coverage-agent/output/unit-test-coverage-patch-proposal.json \
            --test-execution-failures-file coverage-agent/raw/maven-failed-services.txt
          find . -path "*/target/surefire-reports/TEST-*.xml" -type f -print > coverage-agent/raw/surefire-files.txt || true
          find . -path "*/target/site/jacoco/jacoco.xml" -type f -print > coverage-agent/raw/jacoco-files.txt || true
          cat coverage-agent/output/unit-test-coverage-report.md
          cat coverage-agent/output/unit-test-coverage-patch-proposal.md

          PYTHONPATH="agents/unit_test_coverage_agent/src" python -m unit_test_coverage_agent.pr_comment \
            --coverage-json coverage-agent/output/unit-test-coverage-report.json \
            --patch-proposal-json coverage-agent/output/unit-test-coverage-patch-proposal.json \
            --coverage-md coverage-agent/output/unit-test-coverage-report.md \
            --patch-proposal-md coverage-agent/output/unit-test-coverage-patch-proposal.md \
            --output coverage-agent/output/pr-comment.md

      - name: Enforce coverage policy
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH="agents/unit_test_coverage_agent/src" python -m unit_test_coverage_agent.enforce_policy \
            --coverage-json coverage-agent/output/unit-test-coverage-report.json

      - name: Upload coverage agent artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage-pr-agent-${{ github.run_id }}
          path: |
            coverage-agent/output/unit-test-coverage-report.md
            coverage-agent/output/unit-test-coverage-report.json
            coverage-agent/output/unit-test-coverage-patch-proposal.md
            coverage-agent/output/unit-test-coverage-patch-proposal.json
            coverage-agent/output/coverage-reasoning-prompt.md
            coverage-agent/output/pr-comment.md
            coverage-agent/raw/*.txt
            */target/surefire-reports/TEST-*.xml
            */target/site/jacoco/jacoco.xml
          if-no-files-found: warn
          retention-days: 14
