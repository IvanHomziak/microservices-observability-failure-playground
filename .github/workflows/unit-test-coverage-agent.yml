name: Unit Test Coverage Agent

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base git ref for diff"
        required: true
        default: "origin/main"
        type: string
      head_ref:
        description: "Head git ref for diff"
        required: true
        default: "HEAD"
        type: string
      run_tests:
        description: "Run Maven tests and generate JaCoCo XML before collecting evidence"
        required: true
        default: false
        type: boolean
      provider:
        description: "Coverage reasoning provider"
        required: true
        default: "deterministic"
        type: choice
        options:
          - deterministic
          - langchain-openai
      model:
        description: "Optional model name for provider=langchain-openai"
        required: false
        default: "gpt-4.1-mini"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: unit-test-coverage-agent-${{ github.workflow }}-${{ github.ref }}-${{ inputs.provider }}
  cancel-in-progress: true

jobs:
  generate-coverage-evidence:
    name: Generate unit test coverage evidence
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate coverage agent package
        shell: bash
        run: |
          set -euo pipefail
          cd agents/unit_test_coverage_agent
          python -m compileall src tests
          python -m unittest discover -s tests

      - name: Install LangChain dependencies when requested
        if: ${{ inputs.provider == 'langchain-openai' }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ./agents/unit_test_coverage_agent

      - name: Optionally run Maven tests and JaCoCo reports
        if: ${{ inputs.run_tests }}
        shell: bash
        run: |
          set -euo pipefail

          services=(
            api-gateway
            orders-service
            payments-service
            inventory-service
            notification-service
            audit-service
          )

          failed_services=()

          for service in "${services[@]}"; do
            if [ -f "$service/pom.xml" ]; then
              echo "Running Maven verify for $service to generate Surefire and JaCoCo evidence"
              if ! (cd "$service" && mvn -B -ntp verify); then
                echo "Maven verify failed for $service; continuing to collect available evidence"
                failed_services+=("$service")
              fi
            fi
          done

          if [ ${#failed_services[@]} -gt 0 ]; then
            printf '%s\n' "${failed_services[@]}" > coverage-agent-maven-failed-services.txt
          fi

      - name: Generate coverage report
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ inputs.model }}
        run: |
          set -euo pipefail
          mkdir -p coverage-agent/output coverage-agent/raw

          PYTHONPATH="agents/unit_test_coverage_agent/src" \
            python -m unit_test_coverage_agent.main \
              --repository-root . \
              --base-ref "${{ inputs.base_ref }}" \
              --head-ref "${{ inputs.head_ref }}" \
              --provider "${{ inputs.provider }}" \
              --output coverage-agent/output/unit-test-coverage-report.md \
              --json-output coverage-agent/output/unit-test-coverage-report.json \
              --prompt-output coverage-agent/output/coverage-reasoning-prompt.md \
              --patch-proposal-output coverage-agent/output/unit-test-coverage-patch-proposal.md \
              --patch-proposal-json-output coverage-agent/output/unit-test-coverage-patch-proposal.json

          git diff --name-only "${{ inputs.base_ref }}...${{ inputs.head_ref }}" > coverage-agent/raw/changed-files.txt
          find . -path "*/target/surefire-reports/TEST-*.xml" -type f -print > coverage-agent/raw/surefire-files.txt || true
          find . -path "*/target/site/jacoco/jacoco.xml" -type f -print > coverage-agent/raw/jacoco-files.txt || true
          if [ -f coverage-agent-maven-failed-services.txt ]; then
            cp coverage-agent-maven-failed-services.txt coverage-agent/raw/maven-failed-services.txt
          fi

          cat coverage-agent/output/unit-test-coverage-report.md
          cat coverage-agent/output/unit-test-coverage-patch-proposal.md

      - name: Upload coverage agent artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage-agent-${{ github.run_id }}-${{ inputs.provider }}
          path: |
            coverage-agent/output/unit-test-coverage-report.md
            coverage-agent/output/unit-test-coverage-report.json
            coverage-agent/output/unit-test-coverage-patch-proposal.md
            coverage-agent/output/unit-test-coverage-patch-proposal.json
            coverage-agent/output/coverage-reasoning-prompt.md
            coverage-agent/raw/*.txt
            */target/surefire-reports/TEST-*.xml
            */target/site/jacoco/jacoco.xml
          if-no-files-found: warn
          retention-days: 14
