name: Unit Test Coverage Policy Check

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base git ref for diff"
        required: true
        default: "origin/main"
        type: string
      head_ref:
        description: "Head git ref for diff"
        required: true
        default: "HEAD"
        type: string
      run_tests:
        description: "Run Maven tests and generate JaCoCo XML before enforcing policy"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: unit-test-coverage-policy-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enforce-coverage-policy:
    name: Enforce unit test coverage policy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate coverage agent package
        shell: bash
        run: |
          set -euo pipefail
          cd agents/unit_test_coverage_agent
          python -m compileall src tests
          python -m unittest discover -s tests

      - name: Optionally run Maven tests and JaCoCo reports
        if: ${{ inputs.run_tests }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p coverage-agent/raw

          services=(
            api-gateway
            orders-service
            payments-service
            inventory-service
            notification-service
            audit-service
          )

          failed_services=()

          for service in "${services[@]}"; do
            if [ -f "$service/pom.xml" ]; then
              echo "Running Maven verify for $service to generate Surefire and JaCoCo evidence"
              if ! (cd "$service" && mvn -B -ntp verify); then
                echo "Maven verify failed for $service; continuing to collect available evidence"
                failed_services+=("$service")
              fi
            fi
          done

          if [ ${#failed_services[@]} -gt 0 ]; then
            printf '%s\n' "${failed_services[@]}" > coverage-agent/raw/maven-failed-services.txt
          fi

      - name: Generate deterministic coverage report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage-agent/output coverage-agent/raw

          PYTHONPATH="agents/unit_test_coverage_agent/src" \
            python -m unit_test_coverage_agent.main \
              --repository-root . \
              --base-ref "${{ inputs.base_ref }}" \
              --head-ref "${{ inputs.head_ref }}" \
              --policy coverage-policy.yml \
              --provider deterministic \
              --output coverage-agent/output/unit-test-coverage-report.md \
              --json-output coverage-agent/output/unit-test-coverage-report.json \
              --prompt-output coverage-agent/output/coverage-reasoning-prompt.md \
              --patch-proposal-output coverage-agent/output/unit-test-coverage-patch-proposal.md \
              --patch-proposal-json-output coverage-agent/output/unit-test-coverage-patch-proposal.json \
              --test-execution-failures-file coverage-agent/raw/maven-failed-services.txt

          git diff --name-only "${{ inputs.base_ref }}...${{ inputs.head_ref }}" > coverage-agent/raw/changed-files.txt
          find . -path "*/target/surefire-reports/TEST-*.xml" -type f -print > coverage-agent/raw/surefire-files.txt || true
          find . -path "*/target/site/jacoco/jacoco.xml" -type f -print > coverage-agent/raw/jacoco-files.txt || true

          cat coverage-agent/output/unit-test-coverage-report.md

      - name: Enforce coverage policy
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH="agents/unit_test_coverage_agent/src" \
            python -m unit_test_coverage_agent.enforce_policy \
              --coverage-json coverage-agent/output/unit-test-coverage-report.json

      - name: Upload coverage policy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage-policy-check-${{ github.run_id }}
          path: |
            coverage-agent/output/unit-test-coverage-report.md
            coverage-agent/output/unit-test-coverage-report.json
            coverage-agent/output/unit-test-coverage-patch-proposal.md
            coverage-agent/output/unit-test-coverage-patch-proposal.json
            coverage-agent/output/coverage-reasoning-prompt.md
            coverage-agent/raw/*.txt
            */target/surefire-reports/TEST-*.xml
            */target/site/jacoco/jacoco.xml
          if-no-files-found: warn
          retention-days: 14
