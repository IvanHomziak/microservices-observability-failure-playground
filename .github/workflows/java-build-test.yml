name: Java Build Test

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/java-build-test.yml"
      - "api-gateway/**"
      - "orders-service/**"
      - "payments-service/**"
      - "inventory-service/**"
      - "notification-service/**"
      - "audit-service/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/java-build-test.yml"
      - "api-gateway/**"
      - "orders-service/**"
      - "payments-service/**"
      - "inventory-service/**"
      - "notification-service/**"
      - "audit-service/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: java-build-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-build-test:
    name: Maven test (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - orders-service
          - payments-service
          - inventory-service
          - notification-service
          - audit-service

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate Maven project exists
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "pom.xml" ]; then
            echo "pom.xml is missing in ${{ matrix.service }}"
            exit 1
          fi

          echo "Maven project detected for ${{ matrix.service }}"

      - name: Run Maven tests with retry
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Maven test attempt ${attempt}/3 for ${{ matrix.service }}"

            if mvn -B -ntp \
              -Dmaven.wagon.http.retryHandler.count=3 \
              -Dmaven.wagon.httpconnectionManager.ttlSeconds=120 \
              test; then
              echo "Maven tests passed for ${{ matrix.service }}"
              exit 0
            fi

            echo "Maven test attempt ${attempt} failed for ${{ matrix.service }}"
            sleep $((attempt * 20))
          done

          echo "Maven tests failed after 3 attempts for ${{ matrix.service }}"
          exit 1

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7
