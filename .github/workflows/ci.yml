name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  java-build-test:
    name: Java build/test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - orders-service
          - payments-service
          - inventory-service
          - notification-service
          - audit-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven tests
        run: mvn -B test

  shell-validation:
    name: Shell validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: bash -n scripts/*.sh

  docker-compose-validation:
    name: Docker Compose validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose contracts
        run: |
          docker compose config
          docker compose -f docker-compose.yml -f docker-compose.s001.yml config
          docker compose -f docker-compose.yml -f docker-compose.s002.yml config
          [ ! -f docker-compose.s003.yml ] || docker compose -f docker-compose.yml -f docker-compose.s003.yml config
          [ ! -f docker-compose.s004.yml ] || docker compose -f docker-compose.yml -f docker-compose.s004.yml --profile kafka config
          [ ! -f docker-compose.s005.yml ] || docker compose -f docker-compose.yml -f docker-compose.s005.yml --profile kafka config
          [ ! -f docker-compose.s006.yml ] || docker compose -f docker-compose.yml -f docker-compose.s006.yml --profile async config
          [ ! -f docker-compose.s007.yml ] || docker compose -f docker-compose.yml -f docker-compose.s007.yml config
          docker compose -f docker-compose.yml -f docker-compose.kafka.yml --profile kafka config
          docker compose -f docker-compose.yml -f docker-compose.notification.yml --profile async config
          docker compose -f docker-compose.yml -f docker-compose.audit.yml --profile async config
          docker compose --profile observability config
          docker compose --profile full config
