name: Agentic Failure Triage

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "GitHub Actions workflow run ID to triage"
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: agentic-failure-triage-${{ github.workflow }}-${{ github.ref }}-${{ inputs.run_id }}
  cancel-in-progress: true

jobs:
  generate-agent-fix-plan:
    name: Generate agent fix plan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate triage scripts
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/analyze-ci-failure.py
          python3 -m py_compile scripts/generate-agent-fix-plan.py

      - name: Collect workflow evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          mkdir -p triage/raw triage/logs triage/downloaded-artifacts triage/output

          echo "Collecting workflow run metadata for run_id=${RUN_ID}"
          gh run view "$RUN_ID" --repo "$REPOSITORY" --json \
            databaseId,displayTitle,event,headBranch,headSha,name,status,conclusion,createdAt,updatedAt,url \
            > triage/raw/run.json

          echo "Collecting job metadata"
          gh run view "$RUN_ID" --repo "$REPOSITORY" --json jobs \
            > triage/raw/jobs.json

          echo "Downloading workflow artifacts"
          if gh run download "$RUN_ID" --repo "$REPOSITORY" --dir triage/downloaded-artifacts; then
            echo "Downloaded workflow artifacts for run ${RUN_ID}"
          else
            echo "No workflow artifacts downloaded or artifact download failed; continuing"
          fi

          if gh run view "$RUN_ID" --repo "$REPOSITORY" --log > triage/logs/workflow-run.log; then
            echo "Downloaded workflow run logs"
          else
            echo "Could not download workflow run logs; continuing with metadata only"
            touch triage/logs/workflow-run.log
          fi

      - name: Generate deterministic diagnostics report
        shell: bash
        env:
          RUN_ID: ${{ inputs.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          python3 scripts/analyze-ci-failure.py \
            --logs-dir triage \
            --jobs-json triage/raw/jobs.json \
            --output triage/output/ci-failure-diagnostics-report.md \
            --run-id "$RUN_ID" \
            --repository "$REPOSITORY"

      - name: Generate agent fix plan
        shell: bash
        run: |
          set -euo pipefail

          python3 scripts/generate-agent-fix-plan.py \
            --diagnostics-report triage/output/ci-failure-diagnostics-report.md \
            --run-json triage/raw/run.json \
            --jobs-json triage/raw/jobs.json \
            --output triage/output/agent-fix-plan.md

          cat triage/output/agent-fix-plan.md

      - name: Upload triage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentic-failure-triage-${{ inputs.run_id }}
          path: |
            triage/output/ci-failure-diagnostics-report.md
            triage/output/agent-fix-plan.md
            triage/raw/*.json
            triage/logs/*.log
            triage/downloaded-artifacts/**
          if-no-files-found: error
          retention-days: 14
