name: Unit Test Coverage PR Comment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to analyze and comment on"
        required: true
        type: string
      run_tests:
        description: "Run Maven tests and generate JaCoCo XML before collecting evidence"
        required: true
        default: false
        type: boolean
      provider:
        description: "Coverage reasoning provider"
        required: true
        default: "deterministic"
        type: choice
        options:
          - deterministic
          - langchain-openai
      model:
        description: "Optional model name for provider=langchain-openai"
        required: false
        default: "gpt-4.1-mini"
        type: string

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

concurrency:
  group: unit-test-coverage-pr-comment-${{ github.workflow }}-${{ inputs.pr_number }}-${{ inputs.provider }}
  cancel-in-progress: true

jobs:
  generate-and-comment:
    name: Generate coverage evidence and comment on PR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve pull request refs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          mkdir -p coverage-agent/raw coverage-agent/output

          gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json \
            number,title,headRefName,headRefOid,baseRefName,baseRefOid,url,isCrossRepository \
            > coverage-agent/raw/pr.json

          head_sha=$(python - <<'PY'
          import json
          data = json.load(open('coverage-agent/raw/pr.json'))
          print(data['headRefOid'])
          PY
          )
          base_ref=$(python - <<'PY'
          import json
          data = json.load(open('coverage-agent/raw/pr.json'))
          print('origin/' + data['baseRefName'])
          PY
          )

          echo "HEAD_SHA=$head_sha" >> "$GITHUB_ENV"
          echo "BASE_REF=$base_ref" >> "$GITHUB_ENV"

          git fetch origin "$head_sha"
          git checkout --detach "$head_sha"
          git fetch origin "${base_ref#origin/}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate coverage agent package
        shell: bash
        run: |
          set -euo pipefail
          cd agents/unit_test_coverage_agent
          python -m compileall src tests
          python -m unittest discover -s tests

      - name: Install LangChain dependencies when requested
        if: ${{ inputs.provider == 'langchain-openai' }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ./agents/unit_test_coverage_agent

      - name: Optionally run Maven tests and JaCoCo reports
        if: ${{ inputs.run_tests }}
        shell: bash
        run: |
          set -euo pipefail

          services=(
            api-gateway
            orders-service
            payments-service
            inventory-service
            notification-service
            audit-service
          )

          failed_services=()

          for service in "${services[@]}"; do
            if [ -f "$service/pom.xml" ]; then
              echo "Running Maven verify for $service to generate Surefire and JaCoCo evidence"
              if ! (cd "$service" && mvn -B -ntp verify); then
                echo "Maven verify failed for $service; continuing to collect available evidence"
                failed_services+=("$service")
              fi
            fi
          done

          if [ ${#failed_services[@]} -gt 0 ]; then
            printf '%s\n' "${failed_services[@]}" > coverage-agent/raw/maven-failed-services.txt
          fi

      - name: Generate coverage artifacts
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ inputs.model }}
        run: |
          set -euo pipefail

          PYTHONPATH="agents/unit_test_coverage_agent/src" \
            python -m unit_test_coverage_agent.main \
              --repository-root . \
              --base-ref "$BASE_REF" \
              --head-ref "$HEAD_SHA" \
              --provider "${{ inputs.provider }}" \
              --output coverage-agent/output/unit-test-coverage-report.md \
              --json-output coverage-agent/output/unit-test-coverage-report.json \
              --prompt-output coverage-agent/output/coverage-reasoning-prompt.md \
              --patch-proposal-output coverage-agent/output/unit-test-coverage-patch-proposal.md \
              --patch-proposal-json-output coverage-agent/output/unit-test-coverage-patch-proposal.json

          git diff --name-only "$BASE_REF...$HEAD_SHA" > coverage-agent/raw/changed-files.txt
          find . -path "*/target/surefire-reports/TEST-*.xml" -type f -print > coverage-agent/raw/surefire-files.txt || true
          find . -path "*/target/site/jacoco/jacoco.xml" -type f -print > coverage-agent/raw/jacoco-files.txt || true

      - name: Render PR comment
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH="agents/unit_test_coverage_agent/src" \
            python -m unit_test_coverage_agent.pr_comment \
              --coverage-json coverage-agent/output/unit-test-coverage-report.json \
              --patch-proposal-json coverage-agent/output/unit-test-coverage-patch-proposal.json \
              --output coverage-agent/output/pr-comment.md

          cat coverage-agent/output/pr-comment.md

      - name: Post PR comment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file coverage-agent/output/pr-comment.md

      - name: Upload coverage comment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage-pr-comment-${{ inputs.pr_number }}-${{ github.run_id }}-${{ inputs.provider }}
          path: |
            coverage-agent/output/unit-test-coverage-report.md
            coverage-agent/output/unit-test-coverage-report.json
            coverage-agent/output/unit-test-coverage-patch-proposal.md
            coverage-agent/output/unit-test-coverage-patch-proposal.json
            coverage-agent/output/coverage-reasoning-prompt.md
            coverage-agent/output/pr-comment.md
            coverage-agent/raw/*.json
            coverage-agent/raw/*.txt
            */target/surefire-reports/TEST-*.xml
            */target/site/jacoco/jacoco.xml
          if-no-files-found: warn
          retention-days: 14
