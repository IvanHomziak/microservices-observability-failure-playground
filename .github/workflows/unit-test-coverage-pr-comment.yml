name: Unit Test Coverage PR Comment

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to analyze and comment on"
        required: true
        type: string
      run_tests:
        description: "Run Maven tests and generate JaCoCo XML before collecting evidence"
        required: true
        default: false
        type: boolean
      policy_file:
        description: "Coverage policy file to use"
        required: true
        default: "coverage-policy.yml"
        type: choice
        options:
          - coverage-policy.yml
          - coverage-policy-pr.yml
      use_llm_summary:
        description: "Use OpenAI to enhance advisory PR comment"
        required: true
        default: false
        type: boolean
      model:
        description: "OpenAI model for advisory PR comment"
        required: false
        default: "gpt-4.1-mini"
        type: string

permissions:
  contents: read

concurrency:
  group: unit-test-coverage-pr-comment-${{ github.workflow }}-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  generate-coverage-evidence:
    name: Generate coverage evidence without write credentials
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout trusted agent code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: agent-repo
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve pull request refs
        shell: bash
        working-directory: agent-repo
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          mkdir -p ../coverage-agent/raw ../coverage-agent/output

          gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json \
            number,title,headRefName,headRefOid,baseRefName,baseRefOid,url,isCrossRepository \
            > ../coverage-agent/raw/pr.json

          base_branch=$(python - <<'PY'
          import json
          data = json.load(open('../coverage-agent/raw/pr.json'))
          print(data['baseRefName'])
          PY
          )

          echo "BASE_REF=origin/${base_branch}" >> "$GITHUB_ENV"
          echo "HEAD_REF=HEAD" >> "$GITHUB_ENV"

          git fetch origin "$base_branch"
          git fetch origin "refs/pull/${PR_NUMBER}/head:refs/remotes/pull/${PR_NUMBER}/head"
          git worktree add ../pr-worktree "refs/remotes/pull/${PR_NUMBER}/head"

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate trusted coverage agent package
        shell: bash
        working-directory: agent-repo/agents/unit_test_coverage_agent
        run: |
          set -euo pipefail
          python -m compileall src tests
          python -m unittest discover -s tests

      - name: Detect changed files and affected services with trusted agent code
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage-agent/raw
          PYTHONPATH="agent-repo/agents/unit_test_coverage_agent/src" \
            python -m unit_test_coverage_agent.detect_affected_services_cli \
              --repository-root pr-worktree \
              --base-ref "$BASE_REF" \
              --head-ref "$HEAD_REF" \
              --changed-files-output coverage-agent/raw/changed-files.txt \
              --affected-services-output coverage-agent/raw/affected-services.txt

      - name: Optionally run Maven tests and JaCoCo reports for affected services without secrets or write credentials
        if: ${{ inputs.run_tests }}
        shell: bash
        working-directory: pr-worktree
        run: |
          set -euo pipefail
          mkdir -p ../coverage-agent/raw
          : > ../coverage-agent/raw/maven-failed-services.txt

          if [ ! -s ../coverage-agent/raw/affected-services.txt ]; then
            echo "No affected services detected; skipping Maven verification."
            exit 0
          fi

          while IFS= read -r service; do
            [ -n "$service" ] || continue
            if [ -f "$service/pom.xml" ]; then
              echo "Running Maven verify for $service to generate Surefire and JaCoCo evidence"
              if ! (cd "$service" && mvn -B -ntp verify); then
                echo "Maven verify failed for $service; continuing to collect available evidence"
                echo "$service" >> ../coverage-agent/raw/maven-failed-services.txt
              fi
            else
              echo "Affected service $service has no pom.xml; skipping Maven verification for it"
            fi
          done < ../coverage-agent/raw/affected-services.txt

      - name: Generate deterministic coverage artifacts with trusted agent code
        shell: bash
        working-directory: agent-repo
        env:
          POLICY_FILE: ${{ inputs.policy_file }}
        run: |
          set -euo pipefail

          if [ ! -f "${POLICY_FILE}" ]; then
            echo "Coverage policy file does not exist: ${POLICY_FILE}"
            exit 1
          fi

          PYTHONPATH="agents/unit_test_coverage_agent/src" \
            python -m unit_test_coverage_agent.main \
              --repository-root ../pr-worktree \
              --base-ref "$BASE_REF" \
              --head-ref "$HEAD_REF" \
              --policy "${POLICY_FILE}" \
              --provider deterministic \
              --output ../coverage-agent/output/unit-test-coverage-report.md \
              --json-output ../coverage-agent/output/unit-test-coverage-report.json \
              --prompt-output ../coverage-agent/output/coverage-reasoning-prompt.md \
              --patch-proposal-output ../coverage-agent/output/unit-test-coverage-patch-proposal.md \
              --patch-proposal-json-output ../coverage-agent/output/unit-test-coverage-patch-proposal.json \
              --test-execution-failures-file ../coverage-agent/raw/maven-failed-services.txt

          find ../pr-worktree -path "*/target/surefire-reports/TEST-*.xml" -type f -print > ../coverage-agent/raw/surefire-files.txt || true
          find ../pr-worktree -path "*/target/site/jacoco/jacoco.xml" -type f -print > ../coverage-agent/raw/jacoco-files.txt || true

      - name: Upload deterministic coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage-pr-comment-input-${{ inputs.pr_number }}-${{ github.run_id }}
          path: |
            coverage-agent/output/unit-test-coverage-report.md
            coverage-agent/output/unit-test-coverage-report.json
            coverage-agent/output/unit-test-coverage-patch-proposal.md
            coverage-agent/output/unit-test-coverage-patch-proposal.json
            coverage-agent/output/coverage-reasoning-prompt.md
            coverage-agent/raw/*.json
            coverage-agent/raw/*.txt
            pr-worktree/*/target/surefire-reports/TEST-*.xml
            pr-worktree/*/target/site/jacoco/jacoco.xml
          if-no-files-found: warn
          retention-days: 14

  update-pr-comment:
    name: Render and update PR comment with write credentials
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: generate-coverage-evidence
    permissions:
      contents: read
      actions: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout trusted agent code
        uses: actions/checkout@v4
        with:
          path: agent-repo
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download deterministic coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: unit-test-coverage-pr-comment-input-${{ inputs.pr_number }}-${{ github.run_id }}
          path: coverage-agent

      - name: Render PR comment from validated artifacts
        shell: bash
        env:
          USE_LLM_SUMMARY: ${{ inputs.use_llm_summary }}
          OPENAI_API_KEY: ${{ inputs.use_llm_summary && secrets.OPENAI_API_KEY || '' }}
          OPENAI_MODEL: ${{ inputs.model }}
        run: |
          set -euo pipefail

          llm_args=()
          if [ "$USE_LLM_SUMMARY" = "true" ]; then
            if [ -z "${OPENAI_API_KEY:-}" ]; then
              echo "OPENAI_API_KEY repository secret is required when use_llm_summary=true" >&2
              exit 1
            fi
            llm_args+=(
              --use-llm-summary
              --model "$OPENAI_MODEL"
              --llm-summary-output coverage-agent/output/llm-pr-comment-summary.json
            )
          fi

          PYTHONPATH="agent-repo/agents/unit_test_coverage_agent/src" \
            python -m unit_test_coverage_agent.pr_comment \
              --coverage-json coverage-agent/output/unit-test-coverage-report.json \
              --patch-proposal-json coverage-agent/output/unit-test-coverage-patch-proposal.json \
              --coverage-md coverage-agent/output/unit-test-coverage-report.md \
              --patch-proposal-md coverage-agent/output/unit-test-coverage-patch-proposal.md \
              --output coverage-agent/output/pr-comment.md \
              "${llm_args[@]}"

          cat coverage-agent/output/pr-comment.md

      - name: Create or update PR comment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
          COMMENT_MARKER: "<!-- unit-test-coverage-agent-comment -->"
        run: |
          set -euo pipefail

          comments_file=$(mktemp)
          gh api \
            --paginate \
            "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.user.login == \"github-actions[bot]\") | select(.body | contains(env.COMMENT_MARKER)) | .id" \
            > "$comments_file"

          comment_id=$(head -n 1 "$comments_file")

          if [ -n "$comment_id" ]; then
            echo "Updating existing coverage agent comment: $comment_id"
            gh api \
              --method PATCH \
              "repos/${REPOSITORY}/issues/comments/${comment_id}" \
              --field body="$(cat coverage-agent/output/pr-comment.md)"
          else
            echo "Creating new coverage agent comment"
            gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file coverage-agent/output/pr-comment.md
          fi

      - name: Upload rendered PR comment artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage-pr-comment-${{ inputs.pr_number }}-${{ github.run_id }}
          path: |
            coverage-agent/output/pr-comment.md
            coverage-agent/output/unit-test-coverage-report.md
            coverage-agent/output/unit-test-coverage-report.json
            coverage-agent/output/unit-test-coverage-patch-proposal.md
            coverage-agent/output/unit-test-coverage-patch-proposal.json
            coverage-agent/output/coverage-reasoning-prompt.md
            coverage-agent/output/llm-pr-comment-summary.json
            coverage-agent/raw/*.json
            coverage-agent/raw/*.txt
          if-no-files-found: warn
          retention-days: 14
