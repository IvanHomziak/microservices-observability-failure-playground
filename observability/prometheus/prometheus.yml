global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: spring-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080
          - orders-service:8080
          - payments-service:8080
          - inventory-service:8080
          - audit-service:8080
          - notification-service:8080
