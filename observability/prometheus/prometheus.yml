global:
  scrape_interval: 10s
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
  - job_name: spring-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080
          - orders-service:8081
          - payments-service:8082
          - inventory-service:8083
          - audit-service:8084
          - notification-service:8085
