spring:
  application:
    name: orders-service
  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name}
        environment: ${ENVIRONMENT:local}
      fields:
        correlation_id: ${CORRELATION_ID:}

orders:
  rest-clients:
    payments:
      connect-timeout-ms: 500
      read-timeout-ms: 1000
  failures:
    payment-timeout: false
    payment-connection-failure: false
    payment-invalid-response: false
    publish-kafka-failure: false
    publish-notification-failure: false
    tracing-break-propagation-to-payments: false

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/orders
  kafka:
    bootstrap-servers: redpanda:9092
