spring:
  application:
    name: orders-service
  datasource:
    url: jdbc:postgresql://postgres:5432/orders
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: redpanda:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://otel-collector:4317

orders:
  rest-clients:
    payments:
      connect-timeout-ms: 500
      read-timeout-ms: 1000
  failures:
    payment-timeout: false
    payment-connection-failure: false
    payment-invalid-response: false
    publish-kafka-failure: false
    publish-notification-failure: false

logging:
  structured:
    format:
      console: logstash
