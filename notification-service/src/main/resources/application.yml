spring:
  application:
    name: notification-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name}
        environment: ${ENVIRONMENT:local}
      fields:
        correlation_id: ${CORRELATION_ID:}

failure-simulation:
  pubsub:
    publish-failure-enabled: false

---
spring:
  config:
    activate:
      on-profile: docker
  kafka:
    bootstrap-servers: redpanda:9092
