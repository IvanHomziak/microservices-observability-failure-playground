spring:
  application:
    name: api-gateway

services:
  orders:
    base-url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name}
        environment: ${ENVIRONMENT:local}
      fields:
        correlation_id: ${CORRELATION_ID:}

---
spring:
  config:
    activate:
      on-profile: docker
